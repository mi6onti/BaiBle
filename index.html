/* ── Storage ─────────────────────────────────────────────────────────── */
async function loadJSON(key, fallback) {
  if (USE_LOCAL) { try { const r=localStorage.getItem("aperture:"+key); return r?JSON.parse(r):fallback; } catch{return fallback;} }
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/kv_store?key=eq.${encodeURIComponent(key)}&select=value`,
      {headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});
    if (!res.ok) throw new Error(res.status);
    const rows = await res.json();
    return rows.length>0 ? rows[0].value : fallback;
  } catch { return fallback; }
}
async function saveJSON(key, value) {
  if (USE_LOCAL) { try{localStorage.setItem("aperture:"+key,JSON.stringify(value));return{ok:true};}catch(e){return{ok:false,detail:e.message};} }
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/kv_store?on_conflict=key`,{
      method:"POST",
      headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:"resolution=merge-duplicates,return=representation"},
      body:JSON.stringify({key,value})
    });
    if (!res.ok){const b=await res.text();return{ok:false,detail:`${res.status}: ${b.slice(0,200)}`};}
    return {ok:true};
  } catch(e){return{ok:false,detail:`${e.name}: ${e.message}`};}
}

/* ── Helpers ─────────────────────────────────────────────────────────── */
function slugify(s){const b=(s||"").toLowerCase().trim().replace(/[^a-z0-9а-я]+/gi,"-").replace(/(^-|-$)/g,"").slice(0,40);return b||"x"+Math.random().toString(36).slice(2,7);}
function topPreferred(m,fb){const e=Object.entries(m||{});if(!e.length)return fb;e.sort((a,b)=>b[1]-a[1]);return e[0][1]>0?e[0][0]:fb;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

/* ── Claude API ──────────────────────────────────────────────────────── */
async function callClaude(user, maxTokens=600, attempt=0) {
  let res;
  try {
    res = await fetch(CLAUDE_PROXY,{method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${SUPABASE_KEY}`},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:maxTokens,messages:[{role:"user",content:`${JSON_SYS}\n\n${user}`}]})});
  } catch(e) {
    if(attempt<3){await sleep(700*(attempt+1));return callClaude(user,maxTokens,attempt+1);}
    throw new Error(`[fetch] ${e.message}`);
  }
  if(res.status===429&&attempt<3){await sleep(1500*(attempt+1));return callClaude(user,maxTokens,attempt+1);}
  let data;
  try{data=await res.json();}catch(e){
    if(attempt<3){await sleep(700*(attempt+1));return callClaude(user,maxTokens,attempt+1);}
    throw new Error(`[parse] ${e.message}`);
  }
  if(!res.ok) throw new Error(`[http] ${res.status}: ${JSON.stringify(data).slice(0,150)}`);
  if(!data?.content) throw new Error(`[shape] ${JSON.stringify(data).slice(0,100)}`);
  const text=data.content.map(b=>b.text||"").join("\n");
  let clean=text.replace(/```json/gi,"").replace(/```/g,"").trim();
  const fi=clean.indexOf("{"),la=clean.lastIndexOf("}");
  if(fi!==-1&&la>fi)clean=clean.slice(fi,la+1);
  try{return JSON.parse(clean);}catch(e){throw new Error(`[json] ${e.message} | raw=${text.slice(0,100)}`);}
}

/* ── Generation ──────────────────────────────────────────────────────── */

// T.1: generate short display name from prompt
async function genTopicName(prompt) {
  const d = await callClaude(
    `The user wants to learn about: "${prompt}". Generate a short, clear display name (3-6 words max) for this learning plan. Write the name in the SAME language as the prompt above (detect it and match exactly). Never use " inside.\nReturn: {"name":"..."}`,
    200
  );
  return d.name || prompt.slice(0,40);
}

// detect if prompt refers to a specific book/chapter/literary work with sequential passages
async function detectLiteraryMode(prompt) {
  const d = await callClaude(
    `Does this input refer to a SPECIFIC book, chapter, scripture passage, poem, or literary work whose actual sequential text (verses/passages/stanzas) should be studied in order — as opposed to a general topic, skill, or concept to learn about?
Input: "${prompt}"
Examples that ARE literary mode: "Евангелие от Матей, глава 1", "Gospel of Matthew chapter 1", "Sonnet 18 by Shakespeare", "Beowulf".
Examples that are NOT literary mode: "Statistics", "How does logistic regression work", "Rust programming language", "History of Rome" (general topic, not one specific text's exact wording).
Return: {"literary": true or false, "unitLabel": "the natural word for one sequential unit in this work, in the SAME language as the input — e.g. \\"стих\\" for Bible chapters, \\"пасаж\\" for prose, \\"строфа\\" for poems"}`,
    250
  );
  return { literary: !!d.literary, unitLabel: d.unitLabel || "пасаж" };
}

async function genHierarchy(prompt, learningProfile, literary, unitLabel) {
  if (literary) {
    // literary mode: subtopics = sequential groupings, subsubtopics = individual verses/passages
    const d = await callClaude(
      `The user wants to study the actual sequential text of: "${prompt}".
Divide it into 3-6 sequential groupings (e.g. verse ranges, scene breaks, stanza groups) in original order, under 6 words each, no numbering in the name itself. Write names in the SAME language as the input above (match exactly). Never use " inside.
Return: {"names":["..."]}`,
      500
    );
    const names = d.names||[];
    const subtopics=[];
    for(const name of names){
      const s = await callClaude(
        `Work: "${prompt}". Section: "${name}". List the individual ${unitLabel}s (sequential units) that belong in this section, IN ORDER, using their natural label (e.g. "${unitLabel} 1", "${unitLabel} 2" or however this work numbers its units). Use the SAME language as the input above. Never use " inside.
Return: {"subsubtopics":["..."]}`,
        500
      );
      subtopics.push({name, subsubtopics:s.subsubtopics||[]});
    }
    return subtopics;
  }
  const profileHint = learningProfile ? `\nLearner profile (use to shape structure): ${learningProfile}` : "";
  const d = await callClaude(
    `Design a self-study curriculum for: "${prompt}".${profileHint}\nList 4-6 subtopics in learning order, under 5 words each, no numbering. Write ALL subtopic names in the SAME language as the prompt above (detect it and match exactly — if the prompt is in Bulgarian, write in Bulgarian; if in English, write in English; etc). Never use " inside.\nReturn: {"names":["..."]}`,
    500
  );
  const names = d.names||[];
  const subtopics = [];
  for(const name of names){
    const s = await callClaude(
      `Topic: "${prompt}" > "${name}". List 3-4 sub-subtopics, under 6 words each. Write them in the SAME language as the topic above (match exactly). Never use " inside.\nReturn: {"subsubtopics":["..."]}`,
      400
    );
    subtopics.push({name,subsubtopics:s.subsubtopics||[]});
  }
  return subtopics;
}

async function genAbstraction(topic, sub, subsub, literary, unitLabel) {
  const levels=[];
  for(const m of LEVELS){
    if (literary && m.level===5) {
      // last level = literal verbatim text of this specific unit
      const d = await callClaude(
        `Work: "${topic}" > "${sub}" > "${subsub}" (this is a specific ${unitLabel||"passage"}).
Give the LITERAL, VERBATIM text of just this ${unitLabel||"passage"} exactly as it appears in the original work, in the SAME language as the topic chain above. If this is a public-domain, ancient, religious, or classical text, quote it exactly and completely. If this is a modern copyrighted work you cannot reproduce verbatim, instead give the closest faithful paraphrase and prefix it with a short note in brackets that this is a paraphrase, not the exact original wording.
Never use " inside the returned text (use „ and " or rephrase quote marks if the original has them).
Return: {"text":"..."}`,
        900
      );
      levels.push({level:5, text:d.text||""});
      continue;
    }
    const context = literary ? `this is commentary/context for the specific ${unitLabel||"passage"}, not the literal text itself` : "";
    const d=await callClaude(`Topic: "${topic}" > "${sub}" > "${subsub}". Write ONE explanation (45-70 words) at level "${m.label}" (${m.hint})${context?` — ${context}`:""}. Write it in the SAME language as the topic chain above (detect it and match exactly). Never use " inside.\nReturn: {"text":"..."}`,600);
    levels.push({level:m.level,text:d.text||""});
  }
  return levels;
}

async function genAllPersonalities(topic, sub, subsub) {
  const results=[];
  for(const p of PERSONALITIES){
    const d=await callClaude(`Topic: "${topic}" > "${sub}" > "${subsub}". Write ONE explanation (45-70 words) for a "${p.name}" learner (${p.hint}). Write it in the SAME language as the topic chain above (detect it and match exactly). Never use " inside.\nReturn: {"text":"..."}`,600);
    results.push({code:p.code,text:d.text||""});
  }
  return results;
}

// T.4: blend only uses abstraction (levels) ratings
async function genBlend(topic, sub, subsub, level) {
  const lvl = LEVELS.find(l=>l.level===level);
  const d = await callClaude(
    `Topic: "${topic}" > "${sub}" > "${subsub}". Write ONE explanation (90-130 words) in the style of "${lvl?.label}" (${lvl?.hint}). Write it in the SAME language as the topic chain above (detect it and match exactly). Never use " inside.\nReturn: {"text":"..."}`,
    800
  );
  return d.text||"";
}

async function genLevelCheck(topic, hierarchy, prefs, nodeDataMap) {
  const solidUnits=[],confused=[],improveUnits=[],ignoredUnits=[];
  let lowLevelSum=0, lowLevelCount=0;

  // build full unit list from hierarchy (SLUGIFIED to match nodeDataMap keys) to detect never-opened units
  const allUnitKeys=[];
  for(const sub of hierarchy){
    for(const subsub of sub.subsubtopics){
      allUnitKeys.push({key:`${slugify(sub.name)}/${slugify(subsub)}`, label:`${sub.name} › ${subsub}`});
    }
  }

  for(const [key,nd] of Object.entries(nodeDataMap)){
    const unit=key.split("/").slice(1).join(" › ");
    const tunedLevels = nd.tunedAbstraction||[];
    const hasAnyRating = tunedLevels.length>0 || !!nd.tunedBlendKey;
    if(nd.unitConfused) confused.push(unit);
    if(tunedLevels.length>0 && !nd.unitConfused){
      const maxLevel = Math.max(...tunedLevels);
      if(maxLevel<=2){ improveUnits.push(unit); lowLevelSum+=maxLevel; lowLevelCount++; }
      else { solidUnits.push(unit); } // level 3+ counts as adequately/solidly understood
    }
    // opened but never rated and never marked confused = disengaged
    if(!hasAnyRating && !nd.unitConfused) ignoredUnits.push(unit);
  }
  // units never even opened also count as disengaged (bug fix: match slugified keys)
  const openedRelKeys = new Set(Object.keys(nodeDataMap).map(k=>k.split("/").slice(1).join("/")));
  for(const u of allUnitKeys){
    if(!openedRelKeys.has(u.key)) ignoredUnits.push(u.label);
  }

  const avgLowLevel = lowLevelCount>0 ? Math.round(lowLevelSum/lowLevelCount) : null;
  const topLvl=LEVELS.find(l=>l.level===Number(topPreferred(prefs.abstraction,null)))?.label;
  const d=await callClaude(
    `Learner studying "${topic}". Subtopics: ${hierarchy.map(s=>s.name).join(", ")}.
Understood adequately or solidly (level 3+ explanations liked — "Mechanics", "Definition", or "Depth"): ${solidUnits.join(", ")||"none yet"}.
Marked as completely unclear: ${confused.join(", ")||"none"}.
Understood only at a shallow level (only liked "Analogy" or "Example" explanations, levels 1-2 — this is INSUFFICIENT depth, not real command of the topic): ${improveUnits.join(", ")||"none"}.
Never engaged with — no level rated, no "did not understand" mark, not opened (likely low interest, not a knowledge gap): ${ignoredUnits.join(", ")||"none"}.
Preferred explanation level overall: "${topLvl||"unknown"}".
Write in the SAME language as the topic above (detect it and match exactly). Use an OBJECTIVE, calibrated, non-flattering tone throughout — this is a factual assessment, not encouragement. Do not use inflated praise language (avoid phrases like "solid foundation", "great grasp", "well done") for anything below level 3. Be precise about what each level of understanding actually means: level 1-2 (analogy/example only) = superficial, not yet real understanding; level 3 (mechanics) = adequate, functional understanding; level 4-5 (definition/depth) = solid, strong command.
Five sections, with section labels also translated into that same language:
1 first section (80-120 words) — objectively state what is adequately or solidly understood (from the level 3+ list only); if that list is empty, say plainly that nothing has reached an adequate depth yet, without softening it
2 second section (60-100 words) — ONLY about the shallow-understanding units listed above: name them and state plainly that only surface-level analogy/example understanding exists, then explain what deeper understanding (mechanics, formal definition, or expert nuance) is still missing for each; if empty, say there's nothing at this shallow tier
3 third section (100-140 words) — what's missing entirely, including confused units and missing foundational knowledge
4 fourth section (50-90 words) — about the never-engaged units listed above: note plainly these appear low-interest rather than a knowledge gap, and future plans will deprioritize similar content; if empty, say everything has been engaged with
5 fifth section (40-60 words) — one concrete next thing to study
Never use " inside text.\nReturn: {"knows":"...","improve":"...","missing":"...","ignored":"...","next":"..."}`,
    1300
  );
  return {...d, _improveUnits: improveUnits, _avgLowLevel: avgLowLevel, _ignoredUnits: ignoredUnits};
}

// T.5: generate adapted topic as full new plan
async function genAdaptedTopicName(originalTopic, levelCheck) {
  const d = await callClaude(
    `Original topic: "${originalTopic}". The learner is missing: "${levelCheck.missing}". Next step: "${levelCheck.next}". Generate a short display name (3-6 words) for a new focused learning plan that addresses these gaps. Write it in the SAME language as the original topic above (detect it and match exactly). Never use " inside.\nReturn: {"name":"..."}`,
    200
  );
  return d.name || `Адаптирана: ${originalTopic}`;
}

// T.7 updated: all active topics = interest; high engagement = priority
async function genLearningProfile(topics, nodeDataMap) {
  const allTopics = topics.filter(t=>!t.deletedAt);
  const deleted   = topics.filter(t=>t.deletedAt).map(t=>t.name||t.prompt).filter(Boolean);
  if(!allTopics.length&&!deleted.length) return null;

  // score each active topic by engagement
  const scored = allTopics.map(t=>{
    const keys=Object.keys(nodeDataMap).filter(k=>k.startsWith(t.id+"/"));
    const likes=keys.reduce((s,k)=>(s+(nodeDataMap[k]?.tunedAbstraction?.length||0)+(nodeDataMap[k]?.tunedBlendKey?1:0)),0);
    const confused=keys.filter(k=>nodeDataMap[k]?.unitConfused).length;
    return {name:t.name||t.prompt, likes, confused, hasActivity:likes>0||confused>0};
  });

  const priority   = scored.filter(t=>t.likes>=3).map(t=>t.name);
  const interested = scored.filter(t=>t.likes>0&&t.likes<3).map(t=>t.name);
  const passive    = scored.filter(t=>!t.hasActivity).map(t=>t.name);

  const d = await callClaude(
    `A learner uses a study app. Analyze their learning preferences to guide future curriculum generation.
Priority topics (high engagement, many likes): ${priority.join(", ")||"none"}.
Interested topics (some activity): ${interested.join(", ")||"none"}.
Passive topics (saved but not yet studied): ${passive.join(", ")||"none"}.
Archived/deleted topics (did not find value): ${deleted.join(", ")||"none"}.
In 2-3 sentences, describe what kind of learning structure, depth, and content areas this person prefers. Be specific and actionable for a curriculum designer.
Never use " inside.\nReturn: {"profile":"..."}`,
    400
  );
  return d.profile||null;
}

function topicLabel(t){
  if(!t) return "(без заглавие)";
  const candidates=[t.name,t.title,t.prompt,t.topic,t.text,t.query];
  for(const c of candidates){ if(typeof c==="string" && c.trim().length>0) return c.trim(); }
  return t.id ? `План ${t.id.slice(0,8)}` : "(без заглавие)";
}

  }

  async function testSupabase(){
    setDbTesting(true);setDbTest(null);
    const wasLocal=USE_LOCAL;USE_LOCAL=false;
    try{
      const r=await saveJSON("_conntest",{ping:Date.now()});
      if(!r.ok){setDbTest(`❌ Запис: ${r.detail}`);return;}
      const rb=await loadJSON("_conntest",null);
      setDbTest(rb?`✅ Supabase работи!`:`⚠️ Запис мина, четене: ${JSON.stringify(rb)}`);
    }catch(e){setDbTest(`❌ ${e.message}`);}
    finally{USE_LOCAL=wasLocal;setDbTesting(false);}
  }

  async function startTopic(prompt) {
    const trimmed=prompt.trim();if(!trimmed)return;
    setHomeError(null);setHierarchy(null);
    setSubtopicIdx(null);setSubsubIdx(null);
    setNodeId(null);setNodeData(null);setLevelCheck(null);setTopicInput("");

    // build learning profile for better curriculum
    let learningProfile=null;
    try{
      const allNodeKeys=await loadJSON("allNodeKeys",[]);
      const nodeMap={};
      for(const k of allNodeKeys.slice(0,30)){const nd=await loadJSON(`node:${k}`,null);if(nd)nodeMap[k]=nd;}
      learningProfile=await genLearningProfile(topics,nodeMap);
    }catch(e){console.warn("profile gen failed",e);}

    // check if already exists by prompt
    const id=slugify(trimmed)+"-"+Date.now().toString(36);
    setLoadingH(true);
    try{
      // T.1: generate display name from prompt
      const name=await genTopicName(trimmed);
      // detect literary/verbatim-text mode
      const lit = await detectLiteraryMode(trimmed);
      const newTopic={id,name,prompt:trimmed,createdAt:Date.now(),literaryMode:lit.literary,unitLabel:lit.unitLabel};
      const next=[newTopic,...topics];
      setTopics(next);await saveJSON("topics",next);
      setCurrentTopic(newTopic);

      const subtopics=await genHierarchy(trimmed,learningProfile,lit.literary,lit.unitLabel);
      setHierarchy(subtopics);
      await saveJSON(`hierarchy:${id}`,{name,prompt:trimmed,subtopics,literaryMode:lit.literary,unitLabel:lit.unitLabel});
    }catch(e){setHomeError(`Грешка: ${e.message}`);}
    finally{setLoadingH(false);}
  }

  async function resumeTopic(topic){
    setHomeError(null);setHierarchy(null);
    setSubtopicIdx(null);setSubsubIdx(null);
    setNodeId(null);setNodeData(null);setLevelCheck(null);
    setCurrentTopic(topic);
    const cached=await loadJSON(`hierarchy:${topic.id}`,null);
    if(cached){setHierarchy(cached.subtopics);}
    else{
      setLoadingH(true);
      try{
        const subtopics=await genHierarchy(topic.prompt||topic.name,null,topic.literaryMode,topic.unitLabel);
        setHierarchy(subtopics);
        await saveJSON(`hierarchy:${topic.id}`,{name:topic.name,prompt:topic.prompt,subtopics,literaryMode:topic.literaryMode,unitLabel:topic.unitLabel});
      }catch(e){setHomeError(`Грешка: ${e.message}`);}
      finally{setLoadingH(false);}
    }
  }

  // T.2: soft delete
  async function softDeleteTopic(topicId){
    const next=topics.map(t=>t.id===topicId?{...t,deletedAt:Date.now()}:t);
    setTopics(next);await saveJSON("topics",next);
    if(currentTopic?.id===topicId)goHome();
  }

  // T.2: restore from trash
  async function restoreTopic(topicId){
    const next=topics.map(t=>t.id===topicId?{...t,deletedAt:undefined}:t);
    setTopics(next);await saveJSON("topics",next);
  }

  async function openNode(subIdx,ssIdx){
    setSubtopicIdx(subIdx);setSubsubIdx(ssIdx);
    setTab("levels");setNodeError(null);
    const sub=hierarchy[subIdx].name;
    const subsub=hierarchy[subIdx].subsubtopics[ssIdx];
    const id=`${currentTopic.id}/${slugify(sub)}/${slugify(subsub)}`;
    setNodeId(id);
    const EMPTY={abstraction:[],personality:[],blend:null,tunedAbstraction:[],tunedPersonality:[],tunedBlendKey:null,unitConfused:false};
    const cached=await loadJSON(`node:${id}`,EMPTY);
    setNodeData(cached);
    // track all node keys for learning profile
    const allKeys=await loadJSON("allNodeKeys",[]);
    if(!allKeys.includes(id)){await saveJSON("allNodeKeys",[...allKeys,id]);}
    if(!cached.abstraction?.length)doLoadLevels(id,sub,subsub,cached);
  }

  async function doLoadLevels(id,sub,subsub,base){
    setLoadingL(true);setNodeError(null);
    try{
      const abstraction=await genAbstraction(currentTopic.name||currentTopic.title,sub,subsub,currentTopic.literaryMode,currentTopic.unitLabel);
      const updated={...base,abstraction};
      setNodeData(updated);
      const r=await saveJSON(`node:${id}`,updated);
      if(!r.ok)setNodeError(`Генерирано, но не е запазено: ${r.detail}`);
    }catch(e){setNodeError(`Грешка: ${e.message}`);}
    finally{setLoadingL(false);}
  }

  function switchTab(next){
    setTab(next);setNodeError(null);
    // channels hidden (T.3) — no action for channels tab
    if(next==="blend"&&!nodeData?.blend&&!loadingB&&canBlend){
      const sub=hierarchy[subtopicIdx].name,subsub=hierarchy[subtopicIdx].subsubtopics[subsubIdx];
      doGenBlend(nodeId,sub,subsub);
    }
  }

  // T.4: blend uses only abstraction prefs
  async function doGenBlend(id,sub,subsub){
    const level=Number(topPreferred(prefs.abstraction,3));
    setLoadingB(true);setNodeError(null);
    try{
      const text=await genBlend(currentTopic.name||currentTopic.title,sub,subsub,level);
      setNodeData(prev=>{
        const u={...prev,blend:{text,level},tunedBlendKey:null};
        saveJSON(`node:${id}`,u).then(r=>{if(!r.ok)setNodeError(`Микс не е запазен: ${r.detail}`);});
        return u;
      });
    }catch(e){setNodeError(`Грешка: ${e.message}`);}
    finally{setLoadingB(false);}
  }

  async function tune(type,key){
    if(!nodeData)return;
    const field=type==="abstraction"?"tunedAbstraction":"tunedPersonality";
    if(nodeData[field]?.includes(key))return;
    const updNode={...nodeData,[field]:[...(nodeData[field]||[]),key]};
    const updPrefs={...prefs,[type]:{...prefs[type],[key]:(prefs[type]?.[key]||0)+1}};
    setNodeData(updNode);setPrefs(updPrefs);
    await saveJSON(`node:${nodeId}`,updNode);
    await saveJSON("prefs",updPrefs);
  }

  async function tuneBlend(){
    if(!nodeData?.blend||nodeData.tunedBlendKey)return;
    const {level}=nodeData.blend;
    const updNode={...nodeData,tunedBlendKey:`${level}`};
    const updPrefs={...prefs,abstraction:{...prefs.abstraction,[level]:(prefs.abstraction?.[level]||0)+1}};
    setNodeData(updNode);setPrefs(updPrefs);
    await saveJSON(`node:${nodeId}`,updNode);
    await saveJSON("prefs",updPrefs);
  }

  async function markUnitConfused(){
    if(!nodeData||nodeData.unitConfused)return;
    const u={...nodeData,unitConfused:true};
    setNodeData(u);await saveJSON(`node:${nodeId}`,u);
  }
  async function unmarkUnitConfused(){
    if(!nodeData||!nodeData.unitConfused)return;
    const u={...nodeData,unitConfused:false};
    setNodeData(u);await saveJSON(`node:${nodeId}`,u);
  }

  async function runLevelCheck(){
    setLoadingLC(true);setLcError(null);setLevelCheck(null);
    try{
      const nodeMap={};
      for(const sub of hierarchy){
        for(const subsub of sub.subsubtopics){
          const id=`${currentTopic.id}/${slugify(sub.name)}/${slugify(subsub)}`;
          const nd=await loadJSON(`node:${id}`,null);
          if(nd)nodeMap[id]=nd;
        }
      }
      setLevelCheck(await genLevelCheck(currentTopic.name||currentTopic.prompt,hierarchy,prefs,nodeMap));
    }catch(e){setLcError(`Грешка: ${e.message}`);}
    finally{setLoadingLC(false);}
  }

  // T.5: generate adapted topic
  async function generateAdaptedTopic(){
    if(!levelCheck||!currentTopic)return;
    setGA(true);
    try{
      const adaptedName=await genAdaptedTopicName(currentTopic.name||currentTopic.prompt,levelCheck);
      const targetLevel = levelCheck._avgLowLevel ? Math.min(5, levelCheck._avgLowLevel+2) : null;
      const targetLvlLabel = targetLevel ? LEVELS.find(l=>l.level===targetLevel)?.label : null;
      const improveHint = (levelCheck.improve && levelCheck._improveUnits?.length)
        ? ` Also deepen understanding of these shallowly-understood topics: ${levelCheck.improve}${targetLvlLabel?` — aim to bring the learner up to a "${targetLvlLabel}" level of understanding on these.`:""}`
        : "";
      const ignoredHint = (levelCheck._ignoredUnits?.length)
        ? ` Minimize or deprioritize content similar to these topics the learner showed no interest in: ${levelCheck._ignoredUnits.join(", ")}.`
        : "";
      const adaptedPrompt=`${currentTopic.prompt||currentTopic.name} — фокус върху: ${levelCheck.missing}. ${levelCheck.next}${improveHint}${ignoredHint}`;
      const id=slugify(adaptedName)+"-"+Date.now().toString(36);

      // T.6: link parent<->child
      const newTopic={id,name:adaptedName,prompt:adaptedPrompt,createdAt:Date.now(),parentId:currentTopic.id};
      const updatedTopics=topics.map(t=>t.id===currentTopic.id?{...t,childId:id}:t);
      updatedTopics.unshift(newTopic);
      setTopics(updatedTopics);
      await saveJSON("topics",updatedTopics);

      // generate hierarchy
      setLoadingH(true);
      const subtopics=await genHierarchy(adaptedPrompt,null);
      await saveJSON(`hierarchy:${id}`,{name:adaptedName,prompt:adaptedPrompt,subtopics});

      // navigate to new topic
      setCurrentTopic(newTopic);
      setHierarchy(subtopics);
      setSubtopicIdx(null);setSubsubIdx(null);
      setNodeId(null);setNodeData(null);setLevelCheck(null);
    }catch(e){setLcError(`Грешка при генериране: ${e.message}`);}
    finally{setGA(false);setLoadingH(false);}
  }

  /* render */
  return (
    <div className="min-h-screen bg-stone-950 text-stone-200">
      <header className="border-b border-stone-800 px-4 py-3 flex items-center justify-between">
        <button onClick={goHome} className="flex items-center gap-2 group">
          <span className="text-amber-500"><ApertureIcon size={20}/></span>
          <span className="font-display font-bold text-lg text-stone-100">Aperture</span>
          {currentTopic && <span className="font-mono-cal text-xs text-stone-500">/ {topicLabel(currentTopic)}</span>}
        </button>
        <button onClick={toggleStorage}
          className={`font-mono-cal text-[11px] uppercase tracking-wide px-2 py-1 rounded border transition-colors ${storageMode==="supabase"?"border-emerald-800 text-emerald-500 bg-emerald-950/30":"border-amber-800 text-amber-500 bg-amber-950/30"}`}>
          {storageMode==="supabase"?"☁ Supabase":"📱 Local"}
        </button>
      </header>
      <main className="max-w-2xl mx-auto px-4 py-8">
        {booting?<Spinner label="зареждам…"/>
          :!currentTopic?(
            <HomeScreen topicInput={topicInput} setTopicInput={setTopicInput}
              onStart={()=>startTopic(topicInput)} topics={activeTopics} deletedTopics={deletedTopics}
              onResume={resumeTopic} error={homeError}
              onDelete={softDeleteTopic} onRestore={restoreTopic}
              showTrash={showTrash} setShowTrash={setShowTrash}/>
          ):loadingH?<Spinner label="изграждам учебен план…"/>
          :!hierarchy?<ErrorNote message={homeError||"Нещо се обърка."} onRetry={()=>resumeTopic(currentTopic)}/>
          :subtopicIdx===null?(
            <SubtopicList topic={currentTopic} hierarchy={hierarchy}
              onPick={i=>{setLevelCheck(null);setSubtopicIdx(i);}}
              onLevelCheck={runLevelCheck} loadingLevelCheck={loadingLC}
              levelCheck={levelCheck} levelCheckError={lcError}
              onDelete={()=>softDeleteTopic(currentTopic.id)}
              onGenerateAdapted={generateAdaptedTopic} generatingAdapted={generatingAdapted}
              allTopics={topics}
              onNavigateTopic={t=>{resumeTopic(t);}}/>
          ):subsubIdx===null?(
            <SubsubList topic={currentTopic} subtopic={hierarchy[subtopicIdx]}
              onBack={()=>{setSubtopicIdx(null);setNodeId(null);setNodeData(null);}}
              onPick={i=>openNode(subtopicIdx,i)}/>
          ):(
            <NodeView
              topic={topicLabel(currentTopic)}
              subtopic={hierarchy[subtopicIdx].name}
              subsub={hierarchy[subtopicIdx].subsubtopics[subsubIdx]}
              onBack={()=>{setSubsubIdx(null);setNodeId(null);setNodeData(null);setNodeError(null);}}
              tab={tab} setTab={switchTab} nodeData={nodeData}
              loadingLevels={loadingL} loadingBlend={loadingB}
              error={nodeError}
              onRetryLevels={()=>doLoadLevels(nodeId,hierarchy[subtopicIdx].name,hierarchy[subtopicIdx].subsubtopics[subsubIdx],nodeData)}
              onTuneAbstraction={key=>tune("abstraction",key)}
              onTuneBlend={tuneBlend}
              onUnitConfused={markUnitConfused} onUnitUnconfused={unmarkUnitConfused}
              prefs={prefs} topLevel={topLevel}
              canBlend={canBlend} onGenerateBlend={()=>doGenBlend(nodeId,hierarchy[subtopicIdx].name,hierarchy[subtopicIdx].subsubtopics[subsubIdx])}/>
          )}
      </main>
    </div>
  );
}

/* ── Screens ─────────────────────────────────────────────────────────── */
function HomeScreen({topicInput,setTopicInput,onStart,topics,deletedTopics,onResume,error,onDelete,onRestore,showTrash,setShowTrash}){
  return <div className="space-y-8">
    <div>
      <h1 className="font-display text-2xl font-bold text-stone-100 mb-1">Какво искаш да научиш?</h1>
      <p className="font-read text-stone-400 text-sm">Напиши тема или въпрос — Aperture ще генерира учебен план и ще открие кой стил на обяснение ти пасва.</p>
    </div>
    <div className="flex gap-2">
      <input value={topicInput} onChange={e=>setTopicInput(e.target.value)}
        onKeyDown={e=>{if(e.key==="Enter")onStart();}}
        placeholder="напр. Как работи логистичната регресия?"
        className="flex-1 bg-stone-900 border border-stone-700 rounded px-3 py-2 text-stone-100 font-read placeholder:text-stone-500 focus:outline-none focus:border-amber-600"/>
      <button onClick={onStart} className="font-mono-cal text-xs uppercase tracking-wide bg-amber-600 hover:bg-amber-500 text-stone-950 font-medium px-4 rounded">Старт</button>
    </div>
    {error&&<ErrorNote message={error}/>}
    {topics.length>0&&<div>
      <div className="flex items-center justify-between mb-2">
        <div className="font-mono-cal text-xs uppercase tracking-wide text-stone-500">Активни планове</div>
        {deletedTopics.length>0&&<button onClick={()=>setShowTrash(!showTrash)} className="font-mono-cal text-xs text-stone-500 hover:text-amber-400 flex items-center gap-1"><Trash2 size={12}/>{showTrash?"скрий":"кошче"} ({deletedTopics.length})</button>}
      </div>
      <div className="space-y-1">
        {topics.map(t=>(
          <div key={t.id} className="flex items-center gap-2 group">
            <button onClick={()=>onResume(t)} className="flex-1 text-left px-3 py-2 rounded border border-stone-800 hover:border-stone-600 flex items-center justify-between">
              <div>
                <div className="font-read text-stone-200">{topicLabel(t)}</div>
                {t.name&&t.prompt&&t.name!==t.prompt&&<div className="font-mono-cal text-[10px] text-stone-500 mt-0.5 truncate max-w-xs">{t.prompt}</div>}
                {t.parentId&&<div className="font-mono-cal text-[10px] text-stone-500">↳ адаптиран план</div>}
                {t.childId&&<div className="font-mono-cal text-[10px] text-sky-600">→ има адаптация</div>}
              </div>
              <span className="text-stone-600 group-hover:text-amber-500 shrink-0"><ChevronRight size={16}/></span>
            </button>
            <button onClick={()=>onDelete(t.id)} className="p-2 text-stone-600 hover:text-red-400 transition-colors"><Trash2 size={14}/></button>
          </div>
        ))}
      </div>
    </div>}
    {showTrash&&deletedTopics.length>0&&<div>
      <div className="font-mono-cal text-xs uppercase tracking-wide text-stone-600 mb-2">Архивирани</div>
      <div className="space-y-1">
        {deletedTopics.map(t=>(
          <div key={t.id} className="flex items-center gap-2">
            <div className="flex-1 px-3 py-2 rounded border border-stone-800/50 opacity-50">
              <div className="font-read text-stone-400 text-sm">{topicLabel(t)}</div>
            </div>
            <button onClick={()=>onRestore(t.id)} className="font-mono-cal text-xs text-stone-500 hover:text-emerald-400 px-2">↩ върни</button>
          </div>
        ))}
      </div>
    </div>}
  </div>;
}

function SubtopicList({topic,hierarchy,onPick,onLevelCheck,loadingLevelCheck,levelCheck,levelCheckError,onDelete,onGenerateAdapted,generatingAdapted,allTopics,onNavigateTopic}){
  // T.6: find related topics
  const parentTopic = topic.parentId ? allTopics.find(t=>t.id===topic.parentId) : null;
  const childTopic  = topic.childId  ? allTopics.find(t=>t.id===topic.childId)  : null;

  return <div className="space-y-4">
    <div className="flex items-start justify-between gap-2">
      <div>
        <h2 className="font-display text-xl font-bold text-stone-100">{topicLabel(topic)}</h2>
        {topic.prompt&&(topic.name||topic.title)&&topic.prompt!==(topic.name||topic.title)&&(
          <p className="font-read text-stone-400 text-sm mt-1 leading-relaxed">{topic.prompt}</p>
        )}
      </div>
      <button onClick={onDelete} className="shrink-0 p-1.5 text-stone-600 hover:text-red-400 transition-colors mt-1"><Trash2 size={16}/></button>
    </div>

    {/* T.6: related topic links */}
    {(parentTopic||childTopic)&&<div className="space-y-1">
      {parentTopic&&<button onClick={()=>onNavigateTopic(parentTopic)} className="flex items-center gap-2 text-sm font-mono-cal text-stone-500 hover:text-amber-400">
        <ChevronLeft size={14}/> Базов план: {parentTopic.name}
      </button>}
      {childTopic&&<button onClick={()=>onNavigateTopic(childTopic)} className="flex items-center gap-2 text-sm font-mono-cal text-sky-600 hover:text-sky-400">
        Адаптиран план: {childTopic.name} <ArrowRight size={14}/>
      </button>}
    </div>}

    <div className="flex items-center justify-between gap-2">
      <div className="font-mono-cal text-xs uppercase tracking-wide text-stone-500">Теми</div>
      <button onClick={onLevelCheck} disabled={loadingLevelCheck}
        className="flex items-center gap-1.5 font-mono-cal text-xs uppercase tracking-wide px-3 py-1.5 rounded border border-stone-700 text-stone-300 hover:border-amber-500 hover:text-amber-400 disabled:opacity-50 shrink-0">
        {loadingLevelCheck?<Loader2 size={12} className="animate-spin"/>:<Sparkles size={12}/>}
        Провери ниво
      </button>
    </div>

    {levelCheckError&&<ErrorNote message={levelCheckError}/>}
    {levelCheck&&<div className="rounded border border-stone-700 bg-stone-900/60 p-4 space-y-4">
      <div><div className="font-mono-cal text-xs uppercase tracking-wide text-emerald-500 mb-1">Какво знаеш</div>
        <p className="font-read text-stone-200 text-base leading-relaxed">{levelCheck.knows}</p></div>
      {levelCheck.improve&&<div><div className="font-mono-cal text-xs uppercase tracking-wide text-orange-500 mb-1">Какво разбираш, но има нужда да подобриш</div>
        <p className="font-read text-stone-200 text-base leading-relaxed">{levelCheck.improve}</p></div>}
      <div><div className="font-mono-cal text-xs uppercase tracking-wide text-amber-500 mb-1">Какво липсва</div>
        <p className="font-read text-stone-200 text-base leading-relaxed">{levelCheck.missing}</p></div>
      {levelCheck.ignored&&<div><div className="font-mono-cal text-xs uppercase tracking-wide text-stone-500 mb-1">Неангажиращи теми</div>
        <p className="font-read text-stone-400 text-base leading-relaxed">{levelCheck.ignored}</p></div>}
      <div><div className="font-mono-cal text-xs uppercase tracking-wide text-sky-500 mb-1">Следваща стъпка</div>
        <p className="font-read text-stone-200 text-base leading-relaxed">{levelCheck.next}</p></div>
      {/* T.5: generate adapted plan button */}
      <button onClick={onGenerateAdapted} disabled={generatingAdapted}
        className="flex items-center gap-2 font-mono-cal text-xs uppercase tracking-wide bg-sky-700 hover:bg-sky-600 disabled:opacity-50 text-white px-4 py-2 rounded transition-colors">
        {generatingAdapted?<Loader2 size={14} className="animate-spin"/>:<Sparkles size={14}/>}
        Генерирай адаптирана тема
      </button>
    </div>}

    <div className="space-y-1">
      {hierarchy.map((s,i)=>(
        <button key={i} onClick={()=>onPick(i)}
          className="w-full text-left px-3 py-3 rounded border border-stone-800 hover:border-amber-600/50 flex items-center justify-between group">
          <span className="font-read text-stone-100">{s.name}</span>
          <span className="text-stone-600 group-hover:text-amber-500"><ChevronRight size={16}/></span>
        </button>
      ))}
    </div>
  </div>;
}

function SubsubList({topic,subtopic,onBack,onPick}){

      <ChevronLeft size={16}/> {topicLabel(topic)}

    <h2 className="font-display text-xl font-bold text-stone-100">{subtopic.name}</h2>
    <div className="font-mono-cal text-xs uppercase tracking-wide text-stone-500">Единици</div>

      {subtopic.subsubtopics.map((s,i)=>(
        <button key={i} onClick={()=>onPick(i)}
          className="w-full text-left px-3 py-3 rounded border border-stone-800 hover:border-amber-600/50 flex items-center justify-between group">
          <span className="font-read text-stone-100">{s}</span>
          <span className="text-stone-600 group-hover:text-amber-500"><ChevronRight size={16}/></span>
        </button>
      ))}
    </div>

}

function NodeView({topic,subtopic,subsub,onBack,tab,setTab,nodeData,loadingLevels,loadingBlend,error,onRetryLevels,onTuneAbstraction,onTuneBlend,onUnitConfused,onUnitUnconfused,prefs,topLevel,canBlend,onGenerateBlend}){
  const unitConfused=!!nodeData?.unitConfused;
  // T.3: channels tab hidden — only "levels" and "blend"
  const TABS=[{id:"levels",label:"Нива"},{id:"blend",label:"Микс"}];
  return <div className="space-y-5">
    <button onClick={onBack} className="flex items-center gap-1 text-stone-500 hover:text-stone-300 text-sm font-mono-cal">
      <ChevronLeft size={16}/> {subtopic}
    </button>
    <div className="flex items-start justify-between gap-3">
      <div>
        <div className="font-mono-cal text-xs text-stone-500">{topic} › {subtopic}</div>
        <h2 className="font-display text-xl font-bold text-stone-100">{subsub}</h2>
      </div>
      <button onClick={unitConfused?onUnitUnconfused:onUnitConfused}
        className={`shrink-0 font-mono-cal text-xs uppercase tracking-wide px-3 py-1.5 rounded border transition-colors mt-1 ${unitConfused?"border-red-700 text-red-400 bg-red-950/30":"border-stone-700 text-stone-400 hover:border-red-700 hover:text-red-400"}`}>
        {unitConfused?"Неясно ✓":"Не разбирам"}
      </button>
    </div>
    <div className="flex gap-1 border-b border-stone-800">
      {TABS.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)}
          className={`font-mono-cal text-xs uppercase tracking-wide px-3 py-2 border-b-2 transition-colors ${tab===t.id?"border-amber-500 text-amber-400":"border-transparent text-stone-500 hover:text-stone-300"}`}>
          {t.label}
        </button>
      ))}
    </div>
    {error&&<ErrorNote message={error} onRetry={tab==="levels"?onRetryLevels:undefined}/>}
    {tab==="levels"&&<LevelsPanel loading={loadingLevels} levels={nodeData?.abstraction||[]} tuned={nodeData?.tunedAbstraction||[]} onTune={onTuneAbstraction} topLevel={topLevel}/>}
    {tab==="blend"&&<BlendPanel canBlend={canBlend} blend={nodeData?.blend} loading={loadingBlend} onGenerate={onGenerateBlend} tuned={!!nodeData?.tunedBlendKey} onTune={onTuneBlend}/>}
  </div>;
}

/* ── Panels ──────────────────────────────────────────────────────────── */
function LevelsPanel({loading,levels,tuned,onTune,topLevel}){
  if(loading)return <Spinner label="генерирам 5 нива…"/>;
  if(!levels.length)return null;
  return <div className="space-y-4">
    <div className="flex justify-between border-b border-stone-800 pb-2">
      {LEVELS.map(l=>{
        const isTuned=tuned.includes(l.level),isTop=String(l.level)===String(topLevel);
        return <div key={l.level} className="flex flex-col items-center gap-1 flex-1">
          <span className={`font-mono-cal text-xs ${isTuned?"text-amber-500":"text-stone-500"}`}>{l.level}</span>
          <span className={`h-3 w-px ${isTuned?"bg-amber-500":"bg-stone-700"}`}/>
          <span className={`font-mono-cal text-xs uppercase tracking-wide text-center ${isTuned?"text-amber-400":"text-stone-500"}`}>{l.label}</span>
          {isTop&&<span className="text-[10px] text-emerald-500 font-mono-cal">най-добро</span>}
        </div>;
      })}
    </div>
    <div className="space-y-3">
      {levels.map(lv=>{
        const meta=LEVELS.find(l=>l.level===lv.level),isTuned=tuned.includes(lv.level);
        return <div key={lv.level} className={`rounded border p-4 ${isTuned?"border-amber-600/50 bg-amber-950/10":"border-stone-800"}`}>
          <div className="font-mono-cal text-xs uppercase tracking-wide text-stone-400 mb-2">Ниво {lv.level} · {meta?.label}</div>
          <p className="font-read text-stone-200 leading-relaxed text-lg">{lv.text}</p>
          <div className="mt-2"><TuneButton tuned={isTuned} onClick={()=>onTune(lv.level)}/></div>
        </div>;
      })}
    </div>
  </div>;
}

function BlendPanel({canBlend,blend,loading,onGenerate,tuned,onTune}){
  if(!canBlend)return <p className="font-read text-stone-500 text-sm py-6">Оцени поне едно ниво от таб Нива — миксът се изгражда на база харесаните обяснения.</p>;
  if(loading)return <Spinner label="смесвам обяснението…"/>;
  if(!blend)return <button onClick={onGenerate} className="flex items-center gap-2 font-mono-cal text-xs uppercase tracking-wide bg-amber-600 hover:bg-amber-500 text-stone-950 font-medium px-4 py-2 rounded"><Sparkles size={16}/> Генерирай микс</button>;
  const lvl=LEVELS.find(l=>l.level===blend.level);
  return <div className={`rounded border p-4 ${tuned?"border-amber-600/50 bg-amber-950/10":"border-stone-800"}`}>
    <div className="font-mono-cal text-xs uppercase tracking-wide text-stone-400 mb-2">Ниво {blend.level} · {lvl?.label}</div>
    <p className="font-read text-stone-200 leading-relaxed text-lg">{blend.text}</p>
    <div className="mt-2"><TuneButton tuned={tuned} onClick={onTune}/></div>
    <p className="font-mono-cal text-[11px] text-stone-600 mt-2">Оценката влияе глобално на алгоритъма.</p>
    <button onClick={onGenerate} className="mt-2 font-mono-cal text-xs text-stone-500 hover:text-amber-400">Генерирай отново</button>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Aperture/>);
</script>
</body>
</html>
